management:
  health:
    mail:
      enabled: false
    redis:
      enabled: false

spring:
  application:
    name: internship
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true
  # 禁用 Netty Unsafe 警告
  jndi:
    rmi:
      remote:
        object:
          read-timeout: 0
  # Netty 配置 - 禁用 Unsafe API 和 MAC 地址获取
  netty:
    leak-detection:
      level: DISABLED
    allocator:
      type: unpooled
    transport:
      noNative: true
  # 服务器超时配置
  server:
    # Tomcat配置
    tomcat:
      # 连接超时时间(毫秒)
      connection-timeout: 300000
      # 最大连接数
      max-connections: 10000
      # 最大线程数
      threads:
        max: 200
      # 最大HTTP头大小
      max-http-form-post-size: 500MB
    # 响应超时时间(毫秒)
    response-timeout: 300000
  # MVC配置
  mvc:
    # 异步请求处理配置
    async:
      # 异步请求超时时间(毫秒)
      request-timeout: 300000
  # 配置数据库连接信息
  datasource:
    url: jdbc:mysql://localhost:3306/internship?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 1234
    # Hikari连接池配置
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
      auto-commit: true
  # 自动建表配置
  sql:
    init:
      mode: never
  # 文件上传配置
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      max-file-size: 200MB
      max-request-size: 500MB
      enabled: true
  # Redis配置 - 已禁用
  # data:
  #   redis:
  #     host: localhost
  #     port: 6379
  #     database: 0
  #     timeout: 3000
  #     lettuce:
  #       pool:
  #         max-active: 8
  #         max-idle: 8
  #         min-idle: 0
  #         max-wait: -1ms
  #       shutdown-timeout: 200ms
  #       cluster:
  #         refresh:
  #           adaptive: true
  # Cache配置
  cache:
    type: none
  # 邮件配置
  mail:
    host: smtp.qq.com
    port: 465
    username: your-email@qq.com
    password: your-password
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8
  # Jackson日期时间格式配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
      accept-single-value-as-array: true
    parser:
      allow-unquoted-control-chars: true
      allow-backslash-escaping-any-character: true
    mapper:
      accept-case-insensitive-properties: true
  # Spring AI 配置
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-f8c33b5a8b914a258d235bc82c75c2ae}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.1
          max-tokens: 2000
  # HTTP客户端配置
  http:
    client:
      connect-timeout: 30000
      read-timeout: 300000
      pool:
        max-idle-time: 60000
        max-life-time: 900000
      ssl:
        verify: false

# 文件上传配置
file:
  upload:
    path: C:/Users/ASUS/Desktop/project/backend/uploads
    url-prefix: /uploads
    max-size: 209715200

# 备份配置
backup:
  path: D:/Web-work/Internship/backups
  retention:
    days: 30
  compress: false
  format: SQL

# 短信服务配置
sms:
  enabled: false
  debug: true
  access-key-id: your-access-key-id
  access-key-secret: your-access-key-secret
  sign-name: 实习管理系统
  template-code: SMS_123456789

# MyBatis配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true
  check-config-location: false
  mapper-locations: classpath:com/gdmu/mapper/*.xml,classpath:mapper/*.xml

# PageHelper分页插件配置
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql;pageNum=page;pageSize=pageSize;

# 日志配置
logging:
  level:
    root: INFO
    com.gdmu: INFO
    org.springframework.ai: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
    org.springframework.jdbc.support.JdbcTransactionManager: INFO
    com.github.pagehelper: INFO
    com.github.pagehelper.page: INFO

# JWT配置
jwt:
  secret: aXRoZWltYQ==aXRoZWltYQ==aXRoZWltYQ==
  expiration: 86400000
  refresh-expiration: 604800000
  enabled: false

# 阿里云OSS
aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucketName: lzj-java-ai
    region: cn-beijing

server:
  servlet:
    session:
      timeout: 30m
  response-timeout: 60000
