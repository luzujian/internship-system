version: '3.8'

services:
  redis:
    image: docker.1ms.run/library/redis:7-alpine
    container_name: internship-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - internship-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: docker.1ms.run/library/eclipse-temurin:25-jre-alpine
    container_name: internship-backend
    restart: always
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - REDIS_HOST=redis
      - DB_HOST=172.19.0.2
      - DEEPSEEK_API_KEY=sk-placeholder-for-production
      - DEEPSEEK_BASE_URL=https://api.deepseek.com
    volumes:
      - ./backend.jar:/app/app.jar
      - uploads-data:/app/uploads
      - backups-data:/app/backups
    working_dir: /app
    networks:
      - internship-network
      - gdmu_mysql-net
    command: >
      sh -c "java -Xms512m -Xmx2g
      --add-opens=java.base/java.nio=ALL-UNNAMED
      --add-opens=java.base/jdk.internal.misc=ALL-UNNAMED
      --add-opens=java.base/sun.nio.ch=ALL-UNNAMED
      --add-opens=java.base/sun.security.util=ALL-UNNAMED
      --add-opens=java.base/java.lang.reflect=ALL-UNNAMED
      --add-opens=java.base/java.util.concurrent=ALL-UNNAMED
      --add-opens=java.base/java.lang=ALL-UNNAMED
      -Dio.netty.noUnsafe=true
      -Dio.netty.transport.noNative=true
      -Dio.netty.leakDetection.level=DISABLED
      -Dio.netty.allocator.type=unpooled
      -Dio.netty.recycler.maxCapacityPerThread=0
      -jar app.jar"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8080/api/log/list 2>&1 | grep -q '401' && exit 0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: docker.1ms.run/library/nginx:alpine
    container_name: internship-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - internship-network

networks:
  internship-network:
    driver: bridge
  gdmu_mysql-net:
    external: true

volumes:
  redis-data:
  uploads-data:
  backups-data:
